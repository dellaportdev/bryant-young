<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bryant Young</title>

    <script data-goatcounter="https://bryantyoung.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

    <meta name="theme-color" content="#0a192f">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        highlight: 'rgb(var(--highlight-rgb) / <alpha-value>)',
                        contrast: 'rgb(var(--contrast-rgb) / <alpha-value>)',
                    },
                },
            },
        };
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">

    <style type="text/tailwindcss">
        :root {
            font-family: Inter, sans-serif;
            font-feature-settings: 'liga' 1, 'calt' 1;
            --highlight-rgb: 100 149 237;
            --highlight-color: rgb(var(--highlight-rgb));
            --contrast-rgb: 237 181 100;
            --contrast-color: rgb(var(--contrast-rgb));
            --link-color: #fff;
            --shadow-color: #000;
            --glow-color: #fff;
            --bg-from: #102a43;
            --bg-to: #0a192f;
        }

        @supports (font-variation-settings: normal) {
            :root {
                font-family: InterVariable, sans-serif;
            }
        }

        body {
            background:
                radial-gradient(900px circle at 15% 15%, rgb(var(--highlight-rgb) / 0.12), transparent 45%),
                radial-gradient(circle at bottom right, var(--bg-from), var(--bg-to)) fixed;
            background-attachment: fixed;
            text-shadow: 1px 1px 1px var(--shadow-color);
        }

        a:hover {
            color: var(--highlight-color);
        }

        @supports (background-clip: text) {
            .gradient-text h1 {
                position: relative;
                background: linear-gradient(110deg, #5b7fb5 0%, #ffffff 25%, #9db8e8 50%, #ffffff 75%, #5b7fb5 100%);
                background-size: 250% auto;
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                text-shadow: none;
                filter: drop-shadow(1px 2px 1px rgba(0, 0, 0, 0.5));
                animation: sheen 16s linear infinite;
            }
        }

        @keyframes sheen {
            to {
                background-position: -250% center;
            }
        }

        .card {
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .waves {
            pointer-events: none;
            border-bottom: 40px solid #fff;
        }

        .parallax > use {
            animation: wave-slide 22s cubic-bezier(.55, .5, .45, .5) infinite;
        }

        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 8s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 12s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 16s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 24s; }

        @keyframes wave-slide {
            0%   { transform: translate3d(-88px, 0, 0); }
            100% { transform: translate3d(88px, 0, 0); }
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-300 antialiased overflow-x-hidden min-h-screen flex flex-col">
    <main class="flex-1 flex items-center justify-center px-6 py-16" role="main">
        <div class="card max-w-lg w-full text-center">
            <div class="rounded-lg border border-white/10 bg-slate-900/40 px-6 py-8 sm:px-10 mt-6">
                <div class="gradient-text mb-4">
                    <h1 class="text-5xl sm:text-6xl font-bold tracking-tight leading-[1.15] py-1"
                        aria-label="Bryant Young">Bryant Young</h1>
                </div>

                <p class="mt-4 text-white font-semibold [text-shadow:1px_1px_2px_#000]">
                    Your curiousity is appreciated, but the appropriate resume will be at a specific provided link.
                </p>
            </div>
        </div>
    </main>

    <svg class="waves w-full h-32 sm:h-40 opacity-60 mt-auto" xmlns="http://www.w3.org/2000/svg"
        xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 12 150 40" preserveAspectRatio="none"
        shape-rendering="auto">
        <defs>
            <path id="wave" d="M-160 44c30 0 58-28 88-28s 58 28 88 28 58-28 88-28 58 28 88 28 v44h-352z" />
        </defs>
        <g class="parallax">
            <use xlink:href="#wave" x="48" y="-4" fill="rgb(var(--highlight-rgb) / 0.35)" />
            <use xlink:href="#wave" x="48" y="1" fill="rgba(255,255,255,0.4)" />
            <use xlink:href="#wave" x="48" y="5" fill="rgba(255,255,255,0.25)" />
            <use xlink:href="#wave" x="48" y="9" fill="#fff" />
        </g>
    </svg>
</body>

</html>
